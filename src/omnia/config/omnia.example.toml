# Omnia — high-level, add-on-wide defaults (TOML, like the other config files).
#
# One domain per file: this file holds add-on-wide defaults; per-feature tunables live in
# features.toml; provider config in providers.toml (one [llm.<provider>] subsection each).
# These are DEFAULTS shipped with the add-on; the user's changes are saved separately to
# config/omnia.toml (gitignored) and layered on top, with credential files under
# config/secrets/. NOTE: Anki overwrites the whole add-on folder on update — only user_files/
# survives — so a packaged-add-on update would reset config/; fine for a dev (symlink) setup.

log_level = "INFO"

# Which feature plugins are enabled by default. Ticking a plugin in Tools → Omnia flips its
# flag (persisted to config/omnia.toml).
[plugins.auto_flip]
enabled = false

[plugins.typed_accuracy]
enabled = false

[plugins.display_interval]
enabled = false

[plugins.overdue_guard]
enabled = false

[plugins.smart_notes]
enabled = false
